name: Daily scrape

on:
  schedule:
    # 07:00 UTC ≈ 00:00 Pacific standard / 23:00 Pacific daylight previous day.
    # Adjust if you prefer a different local time.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install deps
        run: pip install -r scrapers/requirements.txt

      - name: Install headless browser (for bot-gated venues)
        # Norton Simon (Cloudflare) and Huntington (Vercel checkpoint) only
        # yield events to a real browser. If this step ever fails, the run still
        # proceeds — those two scrapers degrade to zero events, not an error.
        continue-on-error: true
        run: |
          pip install -r scrapers/requirements-render.txt
          python -m playwright install --with-deps chromium

      - name: Run scrapers
        run: python -m scrapers.run_all
        timeout-minutes: 20
        env:
          # Optional: enables the LLM fallback for events whose dates the
          # scrapers can't parse. Set in Settings → Secrets → Actions.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post scraper warnings summary
        if: always()
        continue-on-error: true
        run: |
          python - << 'EOF'
          import json, os, pathlib
          f = pathlib.Path("public/data/warnings.json")
          if not f.exists():
              print("No warnings file yet.")
              exit()
          data = json.loads(f.read_text())
          warnings = data.get("warnings", []) if isinstance(data, dict) else (data if isinstance(data, list) else [])
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary:
              exit()
          with open(summary, "a") as out:
              if not warnings:
                  out.write("## ✅ Scraper warnings: none\n\n")
                  out.write("All events had explicit dates and times.\n")
              else:
                  out.write(f"## ⚠️ Scraper warnings: {len(warnings)} event(s) skipped\n\n")
                  out.write("These events were found on the venue site but could not be registered because the scraper didn't find an explicit time. Fix the scraper when the site format has changed.\n\n")
                  out.write("| Venue | Title | Reason |\n")
                  out.write("|-------|-------|--------|\n")
                  for w in warnings:
                      venue = w.get("venue_id","")
                      title = w.get("title","").replace("|","\\|")
                      reason = w.get("reason","").replace("|","\\|")
                      out.write(f"| `{venue}` | {title} | {reason} |\n")
          EOF

      - name: Post scraper health summary
        if: always()
        continue-on-error: true
        run: |
          python - << 'EOF'
          import json, os, pathlib
          f = pathlib.Path("public/data/health.json")
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not f.exists() or not summary:
              exit()
          health = json.loads(f.read_text())
          stale = {
              vid: h for vid, h in sorted(health.items())
              if h.get("zero_streak", 0) >= 3 and h.get("last_success")
          }
          with open(summary, "a") as out:
              if not stale:
                  out.write("## ✅ Scraper health: all venues that ever produced events still do\n\n")
              else:
                  out.write(f"## 🚨 Scraper health: {len(stale)} venue(s) silent for 3+ runs\n\n")
                  out.write("These venues produced events before but have returned 0 for several consecutive runs — the site layout has probably changed.\n\n")
                  out.write("| Venue | Zero runs | Last produced events |\n")
                  out.write("|-------|-----------|----------------------|\n")
                  for vid, h in stale.items():
                      out.write(f"| `{vid}` | {h['zero_streak']} | {h['last_success']} |\n")
          EOF

      - name: Commit updated data
        if: always()
        run: |
          git config user.name  "art-in-la-bot"
          git config user.email "art-in-la-bot@users.noreply.github.com"
          git config merge.ours.driver true   # honor .gitattributes merge=ours for generated data
          git add public/data/events.json public/data/archive.json public/data/warnings.json public/data/scraped_venues.json public/data/health.json public/data/feeds
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): daily scrape $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: Alert on scraper health problems (creates/updates an issue → emails you)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - << 'EOF' > /tmp/alert_body.md
          import json, pathlib
          health = {}
          f = pathlib.Path("public/data/health.json")
          if f.exists():
              health = json.loads(f.read_text())
          stale = {v: h for v, h in sorted(health.items())
                   if h.get("zero_streak", 0) >= 3 and h.get("last_success")}
          if stale:
              print("@birdofnofeather — the daily scrape found problems.\n")
              print("| Venue | Zero-event runs | Last produced events |")
              print("|---|---|---|")
              for v, h in stale.items():
                  print(f"| `{v}` | {h['zero_streak']} | {h['last_success']} |")
              print("\nA venue silent for 3+ runs usually means its site changed. "
                    "Open a session and ask Claude to fix that venue's scraper.")
          EOF
          if [ -s /tmp/alert_body.md ]; then
            existing=$(gh issue list --state open --search "Scraper health alert in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body-file /tmp/alert_body.md
            else
              gh issue create --title "Scraper health alert" --body-file /tmp/alert_body.md
            fi
          else
            echo "No health problems to report."
          fi

      - name: Alert on job failure (creates an issue → emails you)
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --title "Daily scrape FAILED $(date -u +'%Y-%m-%d')"             --body "@birdofnofeather — the daily scrape workflow failed. Check the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Trigger deploy
        if: success()
        # Pushes made with GITHUB_TOKEN don't fire `push` workflows, so tell
        # deploy.yml directly via the repository_dispatch event it listens for.
        run: |
          curl -sS --fail -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"data-updated"}'