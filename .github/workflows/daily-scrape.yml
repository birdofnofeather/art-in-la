name: Daily scrape

on:
  schedule:
    # 07:00 UTC ≈ 00:00 Pacific standard / 23:00 Pacific daylight previous day.
    # Adjust if you prefer a different local time.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install deps
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers
        run: python -m scrapers.run_all

      - name: Post scraper warnings summary
        if: always()
        run: |
          python - << 'EOF'
          import json, os, pathlib
          f = pathlib.Path("public/data/warnings.json")
          if not f.exists():
              print("No warnings file yet.")
              exit()
          data = json.loads(f.read_text())
          warnings = data.get("warnings", [])
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary:
              exit()
          with open(summary, "a") as out:
              if not warnings:
                  out.write("## ✅ Scraper warnings: none\n\n")
         