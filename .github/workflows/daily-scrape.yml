name: Daily scrape

on:
  schedule:
    # 07:00 UTC ≈ 00:00 Pacific standard / 23:00 Pacific daylight previous day.
    # Adjust if you prefer a different local time.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install deps
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers
        run: python -m scrapers.run_all

      - name: Post scraper warnings summary
        if: always()
        run: |
          python - << 'EOF'
          import json, os, pathlib
          f = pathlib.Path("public/data/warnings.json")
          if not f.exists():
              print("No warnings file yet.")
              exit()
          data = json.loads(f.read_text())
          warnings = data.get("warnings", [])
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary:
              exit()
          with open(summary, "a") as out:
              if not warnings:
                  out.write("## ✅ Scraper warnings: none\n\n")
                  out.write("All events had explicit dates and times.\n")
              else:
                  out.write(f"## ⚠️ Scraper warnings: {len(warnings)} event(s) skipped\n\n")
                  out.write("These events were found on the venue site but could not be registered because the scraper didn't find an explicit time. Fix the scraper when the site format has changed.\n\n")
                  out.write("| Venue | Title | Reason |\n")
                  out.write("|-------|-------|--------|\n")
                  for w in warnings:
                      venue = w.get("venue_id","")
                      title = w.get("title","").replace("|","\\|")
                      reason = w.get("reason","").replace("|","\\|")
                      out.write(f"| `{venue}` | {title} | {reason} |\n")
          EOF

      - name: Commit updated data
        run: |
          git config user.name  "art-in-la-bot"
          git config user.email "art-in-la-bot@users.noreply.github.com"
          git add public/data/events.json public/data/archive.json public/data/warnings.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): daily scrape $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: Trigger deploy
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: data-updated
