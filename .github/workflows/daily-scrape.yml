name: Daily scrape

on:
  schedule:
    # 07:00 UTC ≈ 00:00 Pacific standard / 23:00 Pacific daylight previous day.
    # Adjust if you prefer a different local time.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install deps
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers
        run: python -m scrapers.run_all

      - name: Commit updated data
        run: |
          git config user.name  "art-in-la-bot"
          git config user.email "art-in-la-bot@users.noreply.github.com"
          git add public/data/events.json public/data/archive.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): daily scrape $(date -u +'%Y-%m-%d')"
          git push

      - name: Trigger deploy
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: data-updated
